name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Build Intel (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build Apple Silicon (aarch64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Universal Binary
        run: |
          mkdir -p target/universal/release
          lipo -create \
            target/x86_64-apple-darwin/release/mactemp \
            target/aarch64-apple-darwin/release/mactemp \
            -output target/universal/release/mactemp

      - name: Create .app Bundle
        run: |
          APP_NAME="mactemp"
          BUNDLE_DIR="${APP_NAME}.app"
          CONTENTS_DIR="${BUNDLE_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"
          RESOURCES_DIR="${CONTENTS_DIR}/Resources"

          mkdir -p "${MACOS_DIR}" "${RESOURCES_DIR}"
          cp target/universal/release/mactemp "${MACOS_DIR}/mactemp"

          cat > "${CONTENTS_DIR}/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>mactemp</string>
              <key>CFBundleDisplayName</key>
              <string>mactemp</string>
              <key>CFBundleIdentifier</key>
              <string>com.mactemp.monitor</string>
              <key>CFBundleVersion</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleShortVersionString</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleExecutable</key>
              <string>mactemp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          STAGING_DIR="/tmp/mactemp_dmg_staging"
          rm -rf "${STAGING_DIR}"
          mkdir -p "${STAGING_DIR}"
          cp -r mactemp.app "${STAGING_DIR}/"
          ln -s /Applications "${STAGING_DIR}/Applications"
          
          hdiutil create \
            -volname "mactemp" \
            -srcfolder "${STAGING_DIR}" \
            -ov \
            -format UDZO \
            "mactemp-${GITHUB_REF_NAME}.dmg"
          
          rm -rf "${STAGING_DIR}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mactemp-${{ github.ref_name }}.dmg
